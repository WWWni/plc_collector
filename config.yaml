# PLC面板数据采集系统 - 配置文件
# 由采集程序配置界面自动生成
# ================================

servers:
- name: 串口服务器1
  connection:
    mode: modbus_tcp
    host: 192.168.1.200
    port: 502
    tcp_timeout: 1
  serial:
    baudrate: 9600
    data_bits: 8
    stop_bits: 1
    parity: none
  devices:
  - slave_addr: 1
    name: 计米器1
    device_type: n90sc_counter
scheduler:
  interval_seconds: 4
  batch_read: true
  timeout: 0.3
  retry: 3
  retry_delay: 0.5
logging:
  level: INFO
  file: logs/collector.log
  max_bytes: 10485760
  backup_count: 5
database:
  engine: mysql
  host: localhost
  port: 3306
  username: root
  password: yourpassword
  database: yourdatabase
display_config:
  weaving_panel:
  - key: speed
    label: 转速
    unit: rpm
    format: .1f
  - key: fabric_count
    label: 织布数
    unit: ''
    format: ','
  - key: fabric_total
    label: 织布总数
    unit: ''
    format: ','
  - key: gear
    label: 档位(运/点)
    unit: ''
    format: gear
  n90sc_counter:
  - key: display_value
    label: 当前值
    unit: dynamic
    format: .2f
  - key: unit_text
    label: 单位
    unit: ''
    format: s
  - key: mode_text
    label: 模式
    unit: ''
    format: s
